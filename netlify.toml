# Configuration Netlify — Copilote de Parole
# Site statique (public/) + Netlify Function pour l'API (/api/*) + Netlify Blobs.

[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Le Service Worker ne doit jamais etre servi depuis un cache navigateur perime
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
