<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Copilote de Parole</title>

  <!-- PWA -->
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Parole" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23ffffff'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%8E%A4%3C/text%3E%3C/svg%3E" />

  <!-- Tailwind CSS (heberge en local pour fonctionner hors-ligne) -->
  <script src="./vendor/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { accent: '#f59e0b', accent2: '#ea580c' },
          fontFamily: {
            display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
            body: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>

  <!-- Chart.js (heberge en local pour fonctionner hors-ligne) -->
  <script src="./vendor/chart.umd.min.js"></script>

  <!-- Polices -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-display { font-family: 'Space Grotesk', system-ui, sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .45s cubic-bezier(.22,.61,.36,1) both; }

    .ring-track { stroke: #f1f5f9; }
    .ring-value { stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(.22,.61,.36,1); }

    @keyframes pop { 0%{transform:scale(1)} 45%{transform:scale(1.04)} 100%{transform:scale(1)} }
    .pop { animation: pop .4s ease; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration:.001ms !important; transition-duration:.001ms !important; }
    }

    button:focus-visible, a:focus-visible { outline: 2px solid #f59e0b; outline-offset: 2px; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
  </style>
</head>

<body class="bg-white text-slate-800 antialiased">

  <div class="mx-auto max-w-md min-h-screen flex flex-col relative">

    <header class="px-5 pt-6 pb-3 flex items-center gap-2 border-b border-slate-100">
      <span class="text-2xl">🎤</span>
      <h1 class="font-display font-bold text-lg tracking-tight text-slate-900">Copilote de Parole</h1>
      <span id="syncStatus" class="ml-auto text-[10px] font-semibold uppercase tracking-wider text-slate-400 bg-slate-100 px-2 py-1 rounded-full">…</span>
    </header>

    <main id="app" class="flex-1 px-5 pb-28 overflow-y-auto no-scrollbar">
      <div id="loader" class="flex flex-col items-center justify-center py-32 text-slate-400">
        <div class="w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-sm">Chargement…</p>
      </div>

      <section id="view-today" class="hidden"></section>
      <section id="view-week" class="hidden"></section>
      <section id="view-progress" class="hidden"></section>
      <section id="view-settings" class="hidden"></section>
    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur border-t border-slate-200 safe-bottom z-20">
      <div class="grid grid-cols-4">
        <button data-tab="today" class="tab-btn flex flex-col items-center gap-1 py-3 text-xs text-slate-400 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V10"/></svg>
          <span>Aujourd'hui</span>
        </button>
        <button data-tab="week" class="tab-btn flex flex-col items-center gap-1 py-3 text-xs text-slate-400 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path stroke-linecap="round" d="M3 9h18M8 2v4M16 2v4"/></svg>
          <span>Semaine</span>
        </button>
        <button data-tab="progress" class="tab-btn flex flex-col items-center gap-1 py-3 text-xs text-slate-400 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18M7 14l3-3 3 3 5-6"/></svg>
          <span>Progrès</span>
        </button>
        <button data-tab="settings" class="tab-btn flex flex-col items-center gap-1 py-3 text-xs text-slate-400 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.3 4.3a1 1 0 011.4 0l.5.6a1 1 0 001 .3l.8-.2a1 1 0 011.2.7l.2.8a1 1 0 00.7.7l.8.2a1 1 0 01.7 1.2l-.2.8a1 1 0 00.3 1l.6.5a1 1 0 010 1.4l-.6.5a1 1 0 00-.3 1l.2.8a1 1 0 01-.7 1.2l-.8.2a1 1 0 00-.7.7l-.2.8a1 1 0 01-1.2.7l-.8-.2a1 1 0 00-1 .3l-.5.6a1 1 0 01-1.4 0l-.5-.6a1 1 0 00-1-.3l-.8.2a1 1 0 01-1.2-.7l-.2-.8a1 1 0 00-.7-.7l-.8-.2a1 1 0 01-.7-1.2l.2-.8a1 1 0 00-.3-1l-.6-.5a1 1 0 010-1.4l.6-.5a1 1 0 00.3-1l-.2-.8a1 1 0 01.7-1.2l.8-.2a1 1 0 00.7-.7l.2-.8a1 1 0 011.2-.7l.8.2a1 1 0 001-.3l.5-.6z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Paramètres</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-slate-900 text-white text-sm px-4 py-2 rounded-full shadow-lg fade-up"></div>
  </div>

  <script src="./script.js"></script>
  <script>
    // Service Worker : permet le fonctionnement hors-ligne (mise en cache de l'app)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
